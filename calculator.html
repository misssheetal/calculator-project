<!DOCTYPE html>
<html>
<head>
    <title>Pro Calculator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1e1e2f;
            transition: 0.3s;
        }

        body.light {
            background: #f4f4f4;
        }

        .calculator {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            width: 320px;
        }

        #display {
            width: 100%;
            height: 60px;
            border: none;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 22px;
            padding: 10px;
            text-align: right;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        body.light #display {
            color: black;
            background: #ddd;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 60px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            color: white;
            transition: 0.2s;
        }

        body.light button {
            background: #fff;
            color: black;
        }

        button:hover {
            transform: scale(1.05);
        }

        .operator { background: #ff9f43; }
        .equal { background: #00c853; grid-column: span 2; }
        .clear { background: #ff3b3b; }

        .toggle {
            margin-bottom: 10px;
            text-align: right;
        }

        .toggle button {
            height: 35px;
            font-size: 14px;
        }

        /* 📱 Mobile Responsive */
        @media (max-width: 500px) {
            .calculator {
                width: 95%;
            }

            button {
                height: 50px;
                font-size: 16px;
            }

            #display {
                height: 50px;
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

<div class="calculator">

    <div class="toggle">
        <button onclick="toggleTheme()">🌙 / ☀️</button>
    </div>

    <input type="text" id="display" disabled>

    <div class="buttons">
        <button class="clear" onclick="playSound(); clearDisplay()">C</button>
        <button onclick="playSound(); appendValue('/')">/</button>
        <button onclick="playSound(); appendValue('*')">*</button>
        <button onclick="playSound(); appendValue('-')">-</button>
        <button onclick="playSound(); appendValue('%')">%</button>
        <button onclick="playSound(); appendValue(')')">)</button>
        <button onclick="playSound(); appendValue('+')">+</button>

        <button onclick="playSound(); appendValue('7')">7</button>
        <button onclick="playSound(); appendValue('8')">8</button>
        <button onclick="playSound(); appendValue('9')">9</button>
    

        <button onclick="playSound(); appendValue('4')">4</button>
        <button onclick="playSound(); appendValue('5')">5</button>
        <button onclick="playSound(); appendValue('6')">6</button>

        <button onclick="playSound(); appendValue('1')">1</button>
        <button onclick="playSound(); appendValue('2')">2</button>
        <button onclick="playSound(); appendValue('3')">3</button>

        <button onclick="playSound(); appendValue('0')">0</button>
        <button onclick="playSound(); appendValue('.')">.</button>
        <button class="equal" onclick="playSound(); calculate()">=</button>
    </div>
</div>

<!-- 🔊 Sound -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/button-16.mp3"></audio>

<script>
    function appendValue(value) {
        document.getElementById("display").value += value;
    }

    function clearDisplay() {
        document.getElementById("display").value = "";
    }

    function calculate() {
        try {
            document.getElementById("display").value =
                eval(document.getElementById("display").value);
        } catch {
            alert("Invalid Input");
        }
    }

    function toggleTheme() {
        document.body.classList.toggle("light");
    }

    function playSound() {
        let sound = document.getElementById("clickSound");
        sound.currentTime = 0;
        sound.play();
    }
</script>

</body>
</html>
